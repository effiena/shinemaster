<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ShineMaster Auto{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header img {
            width: 90px;
            margin-bottom: 10px;
        }

        .company-name {
            font-size: 24px;
            font-weight: bold;
        }

        .company-info {
            font-size: 14px;
            color: #555;
        }

        h3 {
            margin-top: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f0f0f0;
            text-align: left;
        }

        .right {
            text-align: right;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #45a049;
        }

        @media print {
            .btn {
                display: none;
            }
            body {
                background: white;
            }
            .container {
                box-shadow: none;
                margin: 0;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">
            <div class="company-name">{{ company.name }}</div>
            <div class="company-info">
                {{ company.address }}<br>
                Contact: {{ company.contact }}
            </div>
        </div>

        {% block content %}{% endblock %}

    </div>
</body>
</html>
